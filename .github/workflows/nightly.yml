name: Nightly Release
on:
  workflow_dispatch:
  push:
    branches:
      - master
permissions:
  contents: write
concurrency:
  group: nightly
  cancel-in-progress: true
jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        config: [Debug, Release]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
      - name: Configure CMake
        run: |
          cmake -S . -B build -G "Ninja" -DCMAKE_BUILD_TYPE=${{ matrix.config }}
      - name: Build
        run: |
          cmake --build build --config ${{ matrix.config }}
      - name: Stage artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging
          Get-ChildItem libs -Filter "*.lib" -Recurse |
            Copy-Item -Destination staging
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.config }}
          path: staging/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Zip artifacts
        run: zip -j nightly.zip artifacts/*
      - name: Update release
        uses: andelf/nightly-release@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: nightly
          name: Nightly Release
          body: |
            Automated nightly build from commit ${{ github.sha }} on branch `${{ github.ref_name }}`.
            ### Included libraries
            | File | Config |
            |------|--------|
            | `4J_Profile.lib` | Release |
            | `4J_Input.lib` | Release |
            | `4J_Render_PC.lib` | Release |
            | `4J_Storage.lib` | Release |
            | `4J_Profile_d.lib` | Debug |
            | `4J_Input_d.lib` | Debug |
            | `4J_Render_PC_d.lib` | Debug |
            | `4J_Storage_d.lib` | Debug |
          files: |
            nightly.zip

  cleanup:
    needs: [build, release]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: build-*
