name: Nightly Release

on:
  workflow_dispatch:
  push:
    branches:
      - 'master'
    paths:
      - '**'
      - '!.gitignore'
      - '!LICENSE'
      - '!*.md'
      - '!.clang-format'
      - '!.github/**'
      - '.github/workflows/nightly.yml'

permissions:
  contents: write

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        config: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build ${{ matrix.config }} x64
        run: |
          msbuild Windows_Libs/Dev/Dev.slnx `
            /p:Configuration=${{ matrix.config }} `
            /p:Platform=x64 `
            /m

      - name: Stage artifacts
        run: |
          New-Item -ItemType Directory -Force -Path staging

          $cfg    = "${{ matrix.config }}"
          $suffix = if ($cfg -eq "Debug") { "_d" } else { "" }
          $base   = "Windows_Libs/Dev"

          Copy-Item "$base/Profile/x64/$cfg/4J_Profile.obj"  "staging/4J_Profile$suffix.obj"
          Copy-Item "$base/Input/x64/$cfg/4J_Input.obj"      "staging/4J_Input$suffix.obj"
          Copy-Item "$base/Render/x64/$cfg/4J_Render.obj"    "staging/4J_Render_PC$suffix.obj"
          Copy-Item "$base/Storage/x64/$cfg/4J_Storage.obj"  "staging/4J_Storage$suffix.obj"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.config }}
          path: staging/*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Zip artifacts
        run: zip -j nightly.zip artifacts/*

      - name: Update release
        uses: andelf/nightly-release@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: nightly
          name: Nightly Release
          body: |
            Automated nightly build from commit ${{ github.sha }} on branch `${{ github.ref_name }}`.

            ### Included libraries
            | File | Config |
            |------|--------|
            | `4J_Profile.obj` | Release |
            | `4J_Input.obj` | Release |
            | `4J_Render_PC.obj` | Release |
            | `4J_Storage.obj` | Release |
            | `4J_Profile_d.obj` | Debug |
            | `4J_Input_d.obj` | Debug |
            | `4J_Render_PC_d.obj` | Debug |
            | `4J_Storage_d.obj` | Debug |
          files: |
            nightly.zip

  cleanup:
    needs: [build, release]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Cleanup artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: build-*